<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Luật Chill</title>

<style>

body{
font-family: Times New Roman;
max-width:800px;
margin:auto;
padding:20px;
}

.post{
border-bottom:1px solid #ccc;
padding:15px 0;
}

button{
margin-right:5px;
cursor:pointer;
}

#adminPanel{
background:#f5f5f5;
padding:15px;
margin-bottom:20px;
}

textarea{
width:100%;
height:150px;
}

input{
width:100%;
padding:8px;
margin-bottom:10px;
}

</style>
</head>

<body>

<h1>Luật Chill</h1>

<button onclick="loginAdmin()">Admin</button>

<div id="adminPanel" style="display:none;">

<h3>Đăng bài mới</h3>

<input id="titleInput" placeholder="Tiêu đề bài viết">

<textarea id="contentInput" placeholder="Nội dung bài viết"></textarea>

<br><br>

<button onclick="addPost()">Đăng bài</button>
<button onclick="logoutAdmin()">Thoát admin</button>

</div>

<div id="posts"></div>

<script>

let isAdmin = false;

function loginAdmin(){

let pass = prompt("Nhập mật khẩu admin");

if(pass === "123"){
isAdmin = true;
document.getElementById("adminPanel").style.display="block";
renderPosts();
}

}

function logoutAdmin(){

isAdmin = false;

document.getElementById("adminPanel").style.display="none";

renderPosts();

}

function addPost(){

const title = document.getElementById("titleInput").value;
const content = document.getElementById("contentInput").value;

if(!title || !content){
alert("Nhập đủ tiêu đề và nội dung");
return;
}

const posts = JSON.parse(localStorage.getItem("posts")) || [];

posts.unshift({
title:title,
content:content
});

localStorage.setItem("posts",JSON.stringify(posts));

document.getElementById("titleInput").value="";
document.getElementById("contentInput").value="";

renderPosts();

}

function deletePost(i){

const posts = JSON.parse(localStorage.getItem("posts")) || [];

posts.splice(i,1);

localStorage.setItem("posts",JSON.stringify(posts));

renderPosts();

}

function editPost(i){

const posts = JSON.parse(localStorage.getItem("posts")) || [];

let newTitle = prompt("Sửa tiêu đề",posts[i].title);
let newContent = prompt("Sửa nội dung",posts[i].content);

if(newTitle && newContent){

posts[i].title = newTitle;
posts[i].content = newContent;

localStorage.setItem("posts",JSON.stringify(posts));

renderPosts();

}

}

function renderPosts(){

const posts = JSON.parse(localStorage.getItem("posts")) || [];

let html="";

posts.forEach((p,i)=>{

html += `
<div class="post">

<h2>${p.title}</h2>

<p>${p.content}</p>

${isAdmin ? `
<button onclick="editPost(${i})">Sửa</button>
<button onclick="deletePost(${i})">Xóa</button>
` : ""}

</div>
`;

});

document.getElementById("posts").innerHTML = html;

}

renderPosts();

</script>

</body>
</html>
